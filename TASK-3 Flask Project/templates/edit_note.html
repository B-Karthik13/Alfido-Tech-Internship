{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h4 class="mb-3">Edit Note</h4>

        <form method="POST" action="{{ url_for('edit_note', note_id=note.id) }}">
            <div class="mb-3">
                <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="title" name="title"
                       value="{{ note.title }}" required>
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">Content <span class="text-danger">*</span></label>
                <textarea class="form-control" id="content" name="content" rows="5" required>{{ note.content }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Update Note</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <hr class="mt-4">
        <small class="text-muted">Created: {{ note.created_at }}</small>
        {% if note.updated_at is defined %}
            <br><small class="text-muted">Last updated: {{ note.updated_at }}</small>
        {% endif %}
    </div>
</div>

{% endblock %}
