{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong>{{ note.title }}</strong>
                <small class="text-muted">{{ note.created_at }}</small>
            </div>
            <div class="card-body">
                <p style="white-space: pre-wrap;">{{ note.content }}</p>
            </div>
            <div class="card-footer d-flex gap-2">
                <a href="{{ url_for('edit_note', note_id=note.id) }}" class="btn btn-primary btn-sm">Edit</a>
                <form action="{{ url_for('delete_note', note_id=note.id) }}" method="POST" class="d-inline"
                      onsubmit="return confirm('Delete this note?')">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
                <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm ms-auto">← Back</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
