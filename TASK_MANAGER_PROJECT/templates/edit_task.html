{% extends "base.html" %}

{% block title %}Edit Task · Task Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-4"><i class="bi bi-pencil-square text-primary"></i> Edit Task</h1>

                <form method="POST" action="{{ url_for('edit_task', task_id=task['id']) }}" novalidate>
                    <div class="mb-3">
                        <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                        <input
                            type="text" class="form-control" id="title" name="title"
                            value="{{ task['title'] }}" required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea
                            class="form-control" id="description" name="description" rows="3"
                        >{{ task['description'] or '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="priority" class="form-label">Priority</label>
                            <select class="form-select" id="priority" name="priority">
                                {% for p in priorities %}
                                    <option value="{{ p }}" {{ 'selected' if task['priority'] == p }}>{{ p }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                {% for s in statuses %}
                                    <option value="{{ s }}" {{ 'selected' if task['status'] == s }}>{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="due_date" class="form-label">Due Date</label>
                            <input
                                type="date" class="form-control" id="due_date" name="due_date"
                                value="{{ task['due_date'] or '' }}"
                            >
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
